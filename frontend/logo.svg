<svg viewBox="0 0 620 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">WrenPath</title>
<desc id="desc">A geometric wren perched on a branch, its cocked tail rendered as a trail of connected glowing nodes symbolizing AI, next to the wordmark WrenPath.</desc>

<!-- ICON -->
<g transform="translate(20,20)">
  <!-- perch / branch (ties to "Path") -->
  <line x1="30" y1="190" x2="210" y2="190" stroke="#a98f73" stroke-width="7" stroke-linecap="round"/>

  <!-- legs -->
  <line x1="122" y1="176" x2="117" y2="190" stroke="#8a6a48" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="152" y1="176" x2="158" y2="190" stroke="#8a6a48" stroke-width="4.5" stroke-linecap="round"/>

  <!-- AI tail: a trail of connected glowing nodes in place of feathers -->
  <g stroke="#f0ac3f" stroke-width="3" fill="none" opacity="0.9">
    <line x1="95" y1="148" x2="72" y2="112"/>
    <line x1="72" y1="112" x2="54" y2="76"/>
    <line x1="54" y1="76" x2="42" y2="42"/>
  </g>
  <circle cx="95" cy="148" r="7" fill="#f0ac3f"/>
  <circle cx="72" cy="112" r="6" fill="#f0ac3f"/>
  <circle cx="54" cy="76" r="5.2" fill="#f0ac3f"/>
  <circle cx="42" cy="42" r="8" fill="#fbd490"/>
  <circle cx="42" cy="42" r="4" fill="#fff3da"/>

  <!-- body -->
  <ellipse cx="140" cy="140" rx="52" ry="42" fill="#6f97cc"/>

  <!-- wing -->
  <path d="M 108 122 Q 138 104 158 130 Q 136 152 108 146 Z" fill="#5a7dab"/>

  <!-- head -->
  <circle cx="186" cy="103" r="29" fill="#7ea1d1"/>

  <!-- beak -->
  <polygon points="211,98 233,106 211,116" fill="#e0965a"/>

  <!-- eye -->
  <circle cx="193" cy="96" r="5.5" fill="#fdfdfd"/>
  <circle cx="194.5" cy="96" r="2.6" fill="#22292f"/>
</g>

<!-- WORDMARK -->
<g transform="translate(300,148)" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="64">
  <text x="0" y="0" fill="#6f97cc">Wren<tspan fill="#e0a641">Path</tspan></text>
</g>
</svg>
