# Render Blueprint - lets Render auto-configure the service when you
# connect this repo, instead of clicking through manual dashboard setup.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: wrenpath
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in the Render dashboard - never in this repo
      - key: WRENPATH_MODEL
        value: claude-sonnet-5
